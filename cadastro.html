<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    .card { border: none; border-radius: 16px; }
    .btn-menu { position: fixed; top: 16px; left: 16px; z-index: 999; }
  </style>
</head>
<body>
  <button class="btn btn-dark btn-menu" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">☰ Menu</button>

  <div class="offcanvas offcanvas-start" id="menuLateral">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Navegação</h5>
      <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="list-group list-group-flush">
        <li class="list-group-item"><a href="login.html" class="text-decoration-none">Login</a></li>
        <li class="list-group-item"><a href="cadastro.html" class="text-decoration-none">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    <div class="col-12 col-sm-10 col-md-7 col-lg-6">
      <div class="card shadow p-4">
        <h3 class="text-center mb-4 fw-bold">Cadastro</h3>

        <div id="alerta-erro" class="alert alert-danger d-none">Preencha todos os campos corretamente.</div>
        <div id="alerta-sucesso" class="alert alert-success d-none">Cadastro realizado com sucesso!</div>

        <div class="mb-3">
          <label class="form-label">Nome completo</label>
          <input type="text" id="nome" class="form-control" placeholder="Seu nome"/>
        </div>

        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com"/>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="••••••••"/>
          </div>
          <div class="col">
            <label class="form-label">Confirmar senha</label>
            <input type="password" id="confirmar" class="form-control" placeholder="••••••••"/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de usuário</label><br/>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo" id="aluno" value="aluno"/>
            <label class="form-check-label" for="aluno">Aluno</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo" id="professor" value="professor"/>
            <label class="form-check-label" for="professor">Professor</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo" id="coordenador" value="coordenador"/>
            <label class="form-check-label" for="coordenador">Coordenador</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Escolaridade</label>
          <select id="escolaridade" class="form-select">
            <option value="">Selecione...</option>
            <option>Ensino Fundamental</option>
            <option>Ensino Médio</option>
            <option>Graduação</option>
            <option>Pós-graduação</option>
            <option>Mestrado</option>
          </select>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" id="termos" class="form-check-input"/>
          <label class="form-check-label" for="termos">Aceito os termos de uso</label>
        </div>

        <button class="btn btn-success w-100" onclick="cadastrar()">Cadastrar</button>
        <p class="text-center mt-3 mb-0 small">Já tem conta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function cadastrar() {
      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const confirmar = document.getElementById('confirmar').value.trim();
      const tipo = document.querySelector('input[name="tipo"]:checked');
      const escolaridade = document.getElementById('escolaridade').value;
      const termos = document.getElementById('termos').checked;

      const erro = document.getElementById('alerta-erro');
      const sucesso = document.getElementById('alerta-sucesso');

      if (!nome || !email || !senha || !confirmar || !tipo || !escolaridade || !termos) {
        erro.classList.remove('d-none');
        sucesso.classList.add('d-none');
        return;
      }

      erro.classList.add('d-none');
      sucesso.classList.remove('d-none');
      // Limpa o formulário
      document.querySelectorAll('input:not([type=radio]):not([type=checkbox])').forEach(i => i.value = '');
      document.querySelectorAll('input[type=radio], input[type=checkbox]').forEach(i => i.checked = false);
      document.getElementById('escolaridade').value = '';
    }
  </script>
</body>
</html>
