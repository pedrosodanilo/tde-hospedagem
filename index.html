<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    .btn-menu { position: fixed; top: 16px; left: 16px; z-index: 999; }
  </style>
</head>
<body>
  <button class="btn btn-dark btn-menu" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">☰ Menu</button>

  <div class="offcanvas offcanvas-start" id="menuLateral">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Navegação</h5>
      <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="list-group list-group-flush">
        <li class="list-group-item"><a href="login.html" class="text-decoration-none">Login</a></li>
        <li class="list-group-item"><a href="cadastro.html" class="text-decoration-none">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="container d-flex justify-content-center align-items-center flex-grow-1">
    <div class="text-center">
      <h1 class="display-5 fw-bold">Bem-vindo!</h1>
      <p class="text-muted">Login realizado com sucesso.</p>
      <a href="login.html" class="btn btn-outline-secondary mt-2">Sair</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
