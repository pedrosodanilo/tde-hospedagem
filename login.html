<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    .card { border: none; border-radius: 16px; }
    .btn-menu { position: fixed; top: 16px; left: 16px; z-index: 999; }
  </style>
</head>
<body>
  <button class="btn btn-dark btn-menu" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">☰ Menu</button>

  <div class="offcanvas offcanvas-start" id="menuLateral">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Navegação</h5>
      <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="list-group list-group-flush">
        <li class="list-group-item"><a href="login.html" class="text-decoration-none">Login</a></li>
        <li class="list-group-item"><a href="cadastro.html" class="text-decoration-none">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="card shadow p-4">
        <h3 class="text-center mb-4 fw-bold">Entrar</h3>
        <div id="alerta" class="alert alert-danger d-none">Preencha todos os campos.</div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••"/>
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
        <p class="text-center mt-3 mb-0 small">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function login() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const alerta = document.getElementById('alerta');
      if (!email || !senha) {
        alerta.classList.remove('d-none');
      } else {
        alerta.classList.add('d-none');
        window.location.href = 'home.html';
      }
    }
  </script>
</body>
</html>
